}

function drawPaused() {
  X.fillStyle = 'rgba(4,4,12,1)'; X.fillRect(0, 0, W, H);

  // PAUSED title centered
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.font = '900 42px Orbitron,sans-serif'; X.shadowColor = '#0fa'; X.shadowBlur = 25;
  X.fillStyle = '#fff'; X.fillText('PAUSED', W / 2, H / 2 - 30); X.shadowBlur = 0;

  const p = 0.5 + Math.sin(Date.now() * 0.004) * 0.5;
  X.font = '400 12px Orbitron,sans-serif';
  X.fillStyle = `rgba(255,255,255,${0.25 + p * 0.25})`;
  X.fillText('PRESS ESC TO RESUME', W / 2, H / 2 + 20);

  drawLeaderboard();
  drawStats();

  // ── Customization panels ──────────────────────────────────
  const g = pauseGridLayout();

  // Ball editor panel background
  X.fillStyle = 'rgba(10,10,30,0.7)';
  X.strokeStyle = 'rgba(0,255,170,0.3)'; X.lineWidth = 1;
  X.beginPath(); X.roundRect(g.bpx, g.bpy, g.ballPanelW, g.ballPanelH, 8); X.fill(); X.stroke();
  X.textAlign = 'center'; X.font = '700 12px Orbitron,sans-serif'; X.fillStyle = '#0fa';
  X.fillText('BALL COLOR', g.bpx + g.ballPanelW / 2, g.bpy + 22);

  // Ball color row (circles)
  for (let i = 0; i < BALL_COLORS.length; i++) {
    const cx2 = g.bcOX + i * (g.bcSz + g.bcGap) + g.bcSz / 2;
    const cy2 = g.bcOY + g.bcSz / 2;
    const stops = BALL_COLORS[i].stops;
    const bg = X.createRadialGradient(cx2 - g.bcSz * 0.15, cy2 - g.bcSz * 0.15, 0, cx2, cy2, g.bcSz / 2);
    bg.addColorStop(0, stops[0]); bg.addColorStop(0.5, stops[1]); bg.addColorStop(1, stops[3]);
    X.beginPath(); X.arc(cx2, cy2, g.bcSz / 2, 0, Math.PI * 2);
    X.fillStyle = bg; X.fill();
    if (i === selectedBallColor) {
      X.strokeStyle = '#0fa'; X.lineWidth = 2.5;
    } else {
      X.strokeStyle = 'rgba(255,255,255,0.2)'; X.lineWidth = 1;
    }
    X.stroke();
  }

  // ── Tab buttons: PRESETS | EDITOR ──────────────────────────
  const tabs = [['PRESETS','style'],['EDITOR','editor']];
  for (let i = 0; i < 2; i++) {
    const tx = i === 0 ? g.tab1X : g.tab2X;
    const sel = pauseTab === tabs[i][1];
    X.fillStyle = sel ? 'rgba(0,255,170,0.15)' : 'rgba(255,255,255,0.04)';
    X.strokeStyle = sel ? '#0fa' : 'rgba(255,255,255,0.15)'; X.lineWidth = sel ? 2 : 1;
    X.beginPath(); X.roundRect(tx, g.tabY, g.tabW, g.tabH, 5); X.fill(); X.stroke();
    X.font = '700 9px Orbitron,sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle';
    X.fillStyle = sel ? '#0fa' : 'rgba(255,255,255,0.4)';
    X.fillText(tabs[i][0], tx + g.tabW / 2, g.tabY + g.tabH / 2);
  }

  if (pauseTab === 'style') {
    // Paddle preset panel
    X.fillStyle = 'rgba(10,10,30,0.7)';
    X.strokeStyle = 'rgba(0,255,170,0.3)'; X.lineWidth = 1;
    X.beginPath(); X.roundRect(g.ppx, g.tabY + g.tabH + 8, g.paddlePanelW, g.paddlePanelH - 20, 8); X.fill(); X.stroke();
    X.textAlign = 'center'; X.font = '700 11px Orbitron,sans-serif'; X.fillStyle = '#0fa';
    X.fillText('PADDLE STYLE', g.ppx + g.paddlePanelW / 2, g.tabY + g.tabH + 24);

    const presetStartY = g.tabY + g.tabH + 38;
    for (let i = 0; i < 9; i++) {
      const col = i % 3, row = Math.floor(i / 3);
      const cx2 = g.pgox + col * (g.cellSz + g.gap), cy2 = presetStartY + row * (g.cellSz + g.gap);
      const sel = i === selectedPaddle && !pixelArt;
      X.fillStyle = sel ? 'rgba(0,255,170,0.15)' : 'rgba(255,255,255,0.05)';
      X.strokeStyle = sel ? '#0fa' : 'rgba(255,255,255,0.15)'; X.lineWidth = sel ? 2 : 1;
      X.beginPath(); X.roundRect(cx2, cy2, g.cellSz, g.cellSz, 6); X.fill(); X.stroke();
      const psz = g.cellSz * 0.5, pcx = cx2 + g.cellSz / 2, pcy = cy2 + g.cellSz / 2 - 4;
      const pst = PADDLE_STYLES[i];
      const pg2 = X.createRadialGradient(pcx - psz * 0.15, pcy - psz * 0.15, 0, pcx, pcy, psz * 0.7);
      pg2.addColorStop(0, pst.top); pg2.addColorStop(1, pst.bot);
      X.beginPath(); X.roundRect(pcx - psz / 2, pcy - psz / 2, psz, psz, 4);
      X.fillStyle = pg2; X.fill();
      X.strokeStyle = pst.glow; X.lineWidth = 1.5; X.stroke();
      X.font = '400 7px Orbitron,sans-serif'; X.textAlign = 'center'; X.textBaseline = 'top';
      X.fillStyle = sel ? '#0fa' : 'rgba(255,255,255,0.4)';
      X.fillText(pst.name, pcx, pcy + psz / 2 + 5);
    }
  } else {
    // ── Pixel Art Editor — contained panel ────────────────────
    X.fillStyle = 'rgba(10,10,30,0.7)';
    X.strokeStyle = 'rgba(0,255,170,0.3)'; X.lineWidth = 1;
    X.beginPath(); X.roundRect(g.edPx, g.edPy, g.edPanelW, g.edPanelH, 8); X.fill(); X.stroke();
    X.textAlign = 'center'; X.font = '700 11px Orbitron,sans-serif'; X.fillStyle = '#0fa';
    X.fillText('PIXEL ART EDITOR', g.edPx + g.edPanelW / 2, g.edPy + 16);

    // ── Left: Pixel Grid ─────────────────────────────────────
    if (editorGrid) {
      for (let y = 0; y < PIX_GRID; y++) for (let x = 0; x < PIX_GRID; x++) {
        const px = g.edGx + x * g.edCellSz, py = g.edGy + y * g.edCellSz;
        if (editorGrid[y][x]) {
          X.fillStyle = editorGrid[y][x]; X.fillRect(px, py, g.edCellSz, g.edCellSz);
        } else {
          X.fillStyle = (x + y) % 2 === 0 ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.08)';
          X.fillRect(px, py, g.edCellSz, g.edCellSz);
        }
      }
      X.strokeStyle = 'rgba(255,255,255,0.08)'; X.lineWidth = 0.5;
      for (let i = 0; i <= PIX_GRID; i++) {
        X.beginPath(); X.moveTo(g.edGx + i * g.edCellSz, g.edGy); X.lineTo(g.edGx + i * g.edCellSz, g.edGy + g.edGridSz); X.stroke();
        X.beginPath(); X.moveTo(g.edGx, g.edGy + i * g.edCellSz); X.lineTo(g.edGx + g.edGridSz, g.edGy + i * g.edCellSz); X.stroke();
      }
      const hx = Math.floor((mouseX - g.edGx) / g.edCellSz), hy = Math.floor((mouseY - g.edGy) / g.edCellSz);
      if (hx >= 0 && hx < PIX_GRID && hy >= 0 && hy < PIX_GRID) {
        X.strokeStyle = '#0fa'; X.lineWidth = 2;
        X.strokeRect(g.edGx + hx * g.edCellSz, g.edGy + hy * g.edCellSz, g.edCellSz, g.edCellSz);
      }
    }
    X.strokeStyle = 'rgba(0,255,170,0.4)'; X.lineWidth = 1.5;
    X.strokeRect(g.edGx - 1, g.edGy - 1, g.edGridSz + 2, g.edGridSz + 2);

    // ── Below grid: Tool row (horizontal) ────────────────────
    const tools = [['PEN','pen'],['ERASE','eraser'],['FILL','fill']];
    const tbw = 52;
    for (let i = 0; i < tools.length; i++) {
      const tx = g.edGx + i * (tbw + 4), ty = g.toolRowY;
      const sel = editorTool === tools[i][1];
      X.fillStyle = sel ? 'rgba(0,255,170,0.2)' : 'rgba(255,255,255,0.05)';
      X.strokeStyle = sel ? '#0fa' : 'rgba(255,255,255,0.15)'; X.lineWidth = 1;
      X.beginPath(); X.roundRect(tx, ty, tbw, 22, 4); X.fill(); X.stroke();
      X.font = '700 8px Orbitron,sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle';
      X.fillStyle = sel ? '#0fa' : 'rgba(255,255,255,0.5)';
      X.fillText(tools[i][0], tx + tbw / 2, ty + 11);
    }
    // Current color indicator next to tools
    X.fillStyle = editorColor;
    X.fillRect(g.edGx + 3 * (tbw + 4) + 4, g.toolRowY + 3, 16, 16);
    X.strokeStyle = '#fff'; X.lineWidth = 1;
    X.strokeRect(g.edGx + 3 * (tbw + 4) + 4, g.toolRowY + 3, 16, 16);

    // ── Action row (horizontal: Upload | Clear | Apply) ──────
    const abw = 56;
    const actBtns = [
      { label: 'UPLOAD', col: '#58b4ff', bg: 'rgba(80,180,255,0.08)', border: 'rgba(80,180,255,0.4)' },
      { label: 'CLEAR', col: '#ff6666', bg: 'rgba(255,80,80,0.08)', border: 'rgba(255,80,80,0.3)' },
      { label: 'APPLY', col: '#0fa', bg: `rgba(0,255,170,${0.08 + (0.5 + Math.sin(Date.now() * 0.005) * 0.5) * 0.1})`, border: '#0fa' },
    ];
    for (let i = 0; i < actBtns.length; i++) {
      const ax = g.edGx + i * (abw + 4), ay = g.actRowY;
      const b = actBtns[i];
      X.fillStyle = b.bg; X.strokeStyle = b.border; X.lineWidth = i === 2 ? 1.5 : 1;
      X.beginPath(); X.roundRect(ax, ay, abw, 24, 4); X.fill(); X.stroke();
      X.font = i === 2 ? '900 8px Orbitron,sans-serif' : '700 7px Orbitron,sans-serif';
      X.textAlign = 'center'; X.textBaseline = 'middle';
      X.fillStyle = b.col; X.fillText(b.label, ax + abw / 2, ay + 12);
    }
    // Upload hint
    X.font = '400 6px Orbitron,sans-serif'; X.textAlign = 'left'; X.textBaseline = 'top';
    X.fillStyle = 'rgba(255,255,255,0.25)';
    X.fillText('UPLOAD: 16x16px RECOMMENDED — ANY IMAGE AUTO-SCALES', g.edGx, g.actRowY + 27);

    // ── Save Slots ───────────────────────────────────────────
    X.font = '400 7px Orbitron,sans-serif'; X.textAlign = 'left'; X.textBaseline = 'bottom';
    X.fillStyle = 'rgba(255,255,255,0.35)';
    X.fillText(selectedSlot >= 0 ? 'SLOT SELECTED' : 'SLOT', g.edGx, g.slotY - 3);

    for (let i = 0; i < 1; i++) {
      const sx = g.edGx + i * (g.slotW + g.slotGap), sy = g.slotY;
      const hasData = !!pixelArtSlots[i];
      const isSel = selectedSlot === i;
      X.fillStyle = isSel ? 'rgba(255,180,0,0.2)' : hasData ? 'rgba(0,255,170,0.08)' : 'rgba(255,255,255,0.04)';
      X.strokeStyle = isSel ? '#ffb400' : hasData ? 'rgba(0,255,170,0.3)' : 'rgba(255,255,255,0.1)';
      X.lineWidth = isSel ? 2 : 1;
      X.beginPath(); X.roundRect(sx, sy, g.slotW, g.slotH, 4); X.fill(); X.stroke();
      if (hasData && pixelArtSlots[i].thumb) {
        X.imageSmoothingEnabled = false;
        X.drawImage(pixelArtSlots[i].thumb, sx + 2, sy + 2, g.slotW - 4, g.slotH - 4);
        X.imageSmoothingEnabled = true;
        // X delete button
        X.fillStyle = 'rgba(0,0,0,0.6)';
        X.fillRect(sx + g.slotW - 12, sy, 12, 12);
        X.font = '700 9px Orbitron,sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle';
        X.fillStyle = '#ff6666'; X.fillText('x', sx + g.slotW - 6, sy + 6);
      } else {
        X.font = '700 10px Orbitron,sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle';
        X.fillStyle = isSel ? '#ffb400' : 'rgba(255,255,255,0.25)';
        X.fillText(`${i+1}`, sx + g.slotW / 2, sy + g.slotH / 2);
      }
    }

    // ── Right column: Palette ────────────────────────────────
    for (let i = 0; i < EDITOR_PALETTE.length; i++) {
      const col = i % g.palCols, row = Math.floor(i / g.palCols);
      const px = g.palX + col * (g.palSz + g.palGap), py = g.palY + row * (g.palSz + g.palGap);
      X.fillStyle = EDITOR_PALETTE[i]; X.fillRect(px, py, g.palSz, g.palSz);
      if (EDITOR_PALETTE[i] === editorColor) {
        X.strokeStyle = '#fff'; X.lineWidth = 2; X.strokeRect(px - 1, py - 1, g.palSz + 2, g.palSz + 2);
      }
    }

    // ── HSL Color Picker ─────────────────────────────────────
    for (let px = 0; px < g.cpW; px += 2) {
      for (let py = 0; py < g.cpH; py += 2) {
        X.fillStyle = hslToHex((px / g.cpW) * 360, 1 - py / g.cpH, pickerL);
        X.fillRect(g.cpX + px, g.cpY + py, 2, 2);
      }
    }
    X.strokeStyle = 'rgba(255,255,255,0.3)'; X.lineWidth = 1;
    X.strokeRect(g.cpX, g.cpY, g.cpW, g.cpH);
    const chX = g.cpX + (pickerH / 360) * g.cpW, chY2 = g.cpY + (1 - pickerS) * g.cpH;
    X.strokeStyle = '#fff'; X.lineWidth = 2;
    X.beginPath(); X.arc(chX, chY2, 4, 0, Math.PI * 2); X.stroke();
    X.strokeStyle = '#000'; X.lineWidth = 1;
    X.beginPath(); X.arc(chX, chY2, 3, 0, Math.PI * 2); X.stroke();

    // Lightness slider
    for (let py = 0; py < g.cpSlH; py += 2) {
      X.fillStyle = hslToHex(pickerH, pickerS, 1 - py / g.cpSlH);
      X.fillRect(g.cpSlX, g.cpSlY + py, g.cpSlW, 2);
    }
    X.strokeStyle = 'rgba(255,255,255,0.3)'; X.lineWidth = 1;
    X.strokeRect(g.cpSlX, g.cpSlY, g.cpSlW, g.cpSlH);
    const lY = g.cpSlY + (1 - pickerL) * g.cpSlH;
    X.fillStyle = '#fff';
    X.beginPath(); X.moveTo(g.cpSlX - 3, lY - 3); X.lineTo(g.cpSlX, lY); X.lineTo(g.cpSlX - 3, lY + 3); X.fill();
    X.beginPath(); X.moveTo(g.cpSlX + g.cpSlW + 3, lY - 3); X.lineTo(g.cpSlX + g.cpSlW, lY); X.lineTo(g.cpSlX + g.cpSlW + 3, lY + 3); X.fill();

    // Color preview + add swatch
    X.fillStyle = editorColor;
    X.fillRect(g.cpX, g.cpPrevY, g.cpPrevSz, g.cpPrevSz);
    X.strokeStyle = '#fff'; X.lineWidth = 1;
    X.strokeRect(g.cpX, g.cpPrevY, g.cpPrevSz, g.cpPrevSz);
    const addBtnX = g.cpX + g.cpPrevSz + 4;
    X.fillStyle = 'rgba(0,255,170,0.1)'; X.strokeStyle = 'rgba(0,255,170,0.4)'; X.lineWidth = 1;
    X.beginPath(); X.roundRect(addBtnX, g.cpPrevY, 36, g.cpPrevSz, 3); X.fill(); X.stroke();
    X.font = '700 7px Orbitron,sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle';
    X.fillStyle = '#0fa'; X.fillText('+ADD', addBtnX + 18, g.cpPrevY + g.cpPrevSz / 2);

    // ── Custom Swatches ──────────────────────────────────────
    if (customSwatches.length > 0) {
      X.font = '400 6px Orbitron,sans-serif'; X.textAlign = 'left'; X.textBaseline = 'bottom';
      X.fillStyle = 'rgba(255,255,255,0.3)'; X.fillText('SWATCHES', g.swX, g.swY - 2);
      for (let i = 0; i < customSwatches.length; i++) {
        const col = i % g.swCols2, row = Math.floor(i / g.swCols2);
        const sx = g.swX + col * (g.swSz + g.swGap), sy = g.swY + row * (g.swSz + g.swGap);
        X.fillStyle = customSwatches[i]; X.fillRect(sx, sy, g.swSz, g.swSz);
        if (customSwatches[i] === editorColor) {
          X.strokeStyle = '#fff'; X.lineWidth = 1.5; X.strokeRect(sx - 1, sy - 1, g.swSz + 2, g.swSz + 2);
        }
      }
      const swRows = Math.ceil(customSwatches.length / g.swCols2);
      const clearSwY = g.swY + swRows * (g.swSz + g.swGap) + 2;
      X.fillStyle = 'rgba(255,80,80,0.06)'; X.strokeStyle = 'rgba(255,80,80,0.2)'; X.lineWidth = 1;
      X.beginPath(); X.roundRect(g.swX, clearSwY, 60, 16, 3); X.fill(); X.stroke();
      X.font = '400 6px Orbitron,sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle';
      X.fillStyle = 'rgba(255,100,100,0.6)'; X.fillText('CLEAR', g.swX + 30, clearSwY + 8);
    }
  }

  // ── Friends & Party Panel (bottom-left) ────────────────────
  const fpW = 280, fpH = 300;
  const fpX = 20, fpY = H - fpH - 20;
  X.fillStyle = 'rgba(10,10,30,0.8)';
  X.strokeStyle = 'rgba(0,255,170,0.3)'; X.lineWidth = 1;
  X.beginPath(); X.roundRect(fpX, fpY, fpW, fpH, 8); X.fill(); X.stroke();

  // Header
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.font = '700 14px Orbitron,sans-serif'; X.fillStyle = '#0fa';
  X.fillText('FRIENDS & PARTY', fpX + fpW / 2, fpY + 20);

  X.strokeStyle = 'rgba(255,255,255,0.08)'; X.lineWidth = 1;
  X.beginPath(); X.moveTo(fpX + 10, fpY + 36); X.lineTo(fpX + fpW - 10, fpY + 36); X.stroke();

  // Invite link button
  const invBtnY = fpY + 44;
  X.fillStyle = 'rgba(0,255,170,0.08)';
  X.strokeStyle = 'rgba(0,255,170,0.3)'; X.lineWidth = 1;
  X.beginPath(); X.roundRect(fpX + 14, invBtnY, fpW - 28, 26, 4); X.fill(); X.stroke();
  X.font = '700 10px Orbitron,sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillStyle = '#0fa';
  X.fillText('COPY INVITE LINK', fpX + fpW / 2, invBtnY + 13);

  // Party section
  const partyY = invBtnY + 36;
  X.font = '700 10px Orbitron,sans-serif'; X.textAlign = 'left'; X.fillStyle = 'rgba(255,255,255,0.4)';
  X.fillText('PARTY', fpX + 14, partyY);
  if (partyMembers.length === 0) {
    X.font = '400 9px Orbitron,sans-serif'; X.fillStyle = 'rgba(255,255,255,0.15)';
    X.fillText('Invite friends to start a party', fpX + 14, partyY + 18);
  } else {
    for (let i = 0; i < partyMembers.length; i++) {
      X.font = '400 10px Orbitron,sans-serif'; X.fillStyle = '#0fa';
      X.fillText(partyMembers[i], fpX + 24, partyY + 18 + i * 18);
      X.font = '400 8px Orbitron,sans-serif'; X.fillStyle = 'rgba(255,255,255,0.2)';
      X.fillText('(invited)', fpX + 24 + X.measureText(partyMembers[i]).width + 6, partyY + 18 + i * 18);
    }
  }

  // Divider
  const friendsY = partyY + 34 + Math.max(0, partyMembers.length - 1) * 18;
  X.strokeStyle = 'rgba(255,255,255,0.06)'; X.lineWidth = 1;
  X.beginPath(); X.moveTo(fpX + 10, friendsY); X.lineTo(fpX + fpW - 10, friendsY); X.stroke();

  // Friends list
  X.font = '700 10px Orbitron,sans-serif'; X.textAlign = 'left'; X.fillStyle = 'rgba(255,255,255,0.4)';
  X.fillText('FRIENDS', fpX + 14, friendsY + 16);
  X.font = '400 11px Orbitron,sans-serif'; X.textBaseline = 'middle';
  if (friendsList.length === 0) {
    X.fillStyle = 'rgba(255,255,255,0.15)';
    X.fillText('No friends added yet', fpX + 20, friendsY + 38);
    X.font = '400 9px Orbitron,sans-serif'; X.fillStyle = 'rgba(255,255,255,0.1)';
    X.fillText('Click "Add Friend" on leaderboard', fpX + 20, friendsY + 54);
  } else {
    for (let i = 0; i < Math.min(friendsList.length, 6); i++) {
      const fy = friendsY + 36 + i * 24;
      // Online dot
      X.beginPath(); X.arc(fpX + 20, fy, 4, 0, Math.PI * 2);
      const inGame = dummies.some(d => d.name === friendsList[i]);
      X.fillStyle = inGame ? '#0f0' : 'rgba(255,255,255,0.2)'; X.fill();
      // Name (clickable)
      X.fillStyle = inGame ? '#0fa' : 'rgba(255,255,255,0.4)';
      X.font = '400 11px Orbitron,sans-serif'; X.textAlign = 'left';
      X.fillText(friendsList[i], fpX + 32, fy);
      // Invite button
      const inParty = partyMembers.includes(friendsList[i]);
      const invLabel = inParty ? 'INVITED' : 'INVITE';
      X.font = '700 7px Orbitron,sans-serif';
      X.fillStyle = inParty ? 'rgba(0,255,170,0.15)' : 'rgba(0,255,170,0.08)';
      X.strokeStyle = inParty ? '#0fa' : 'rgba(0,255,170,0.25)'; X.lineWidth = 1;
      X.beginPath(); X.roundRect(fpX + fpW - 74, fy - 8, 54, 16, 3); X.fill(); X.stroke();
      X.textAlign = 'center'; X.fillStyle = inParty ? '#0fa' : 'rgba(0,255,170,0.5)';
      X.fillText(invLabel, fpX + fpW - 47, fy);
    }
  }

  // Friend dropdown menu
  if (friendDropdown) {
    const ddW = 100, ddH = 60;
    const ddX = Math.min(friendDropdown.x, W - ddW - 10);
    const ddY = friendDropdown.y;
    X.fillStyle = 'rgba(15,15,35,0.95)';
    X.strokeStyle = 'rgba(0,255,170,0.4)'; X.lineWidth = 1;
    X.beginPath(); X.roundRect(ddX, ddY, ddW, ddH, 5); X.fill(); X.stroke();
    // Chat option
    X.fillStyle = mouseY >= ddY + 4 && mouseY <= ddY + 28 ? 'rgba(0,255,170,0.1)' : 'transparent';
    X.fillRect(ddX + 2, ddY + 4, ddW - 4, 24);
    X.font = '700 10px Orbitron,sans-serif'; X.textAlign = 'left'; X.textBaseline = 'middle';
    X.fillStyle = '#0fa'; X.fillText('Chat', ddX + 12, ddY + 16);
    // Remove friend option
    X.fillStyle = mouseY >= ddY + 32 && mouseY <= ddY + 56 ? 'rgba(255,80,80,0.1)' : 'transparent';
    X.fillRect(ddX + 2, ddY + 32, ddW - 4, 24);
    X.fillStyle = 'rgba(255,100,100,0.7)'; X.fillText('Remove', ddX + 12, ddY + 44);
  }

  // Open chat dialogs
  for (let ci = 0; ci < openChats.length; ci++) {
    const chat = openChats[ci];
    const cW = 240, cH = 200;
    const cX = fpX + fpW + 12 + ci * (cW + 10), cY = H - cH - 20;
    // Panel
    X.fillStyle = 'rgba(10,10,30,0.9)';
    X.strokeStyle = 'rgba(0,255,170,0.3)'; X.lineWidth = 1;
    X.beginPath(); X.roundRect(cX, cY, cW, cH, 8); X.fill(); X.stroke();
    // Header
    X.fillStyle = 'rgba(0,255,170,0.08)'; X.fillRect(cX + 1, cY + 1, cW - 2, 28);
    X.font = '700 11px Orbitron,sans-serif'; X.textAlign = 'left'; X.textBaseline = 'middle';
    X.fillStyle = '#0fa'; X.fillText(chat.name, cX + 12, cY + 15);
    // Close X
    X.font = '700 12px Orbitron,sans-serif'; X.textAlign = 'center';
    X.fillStyle = 'rgba(255,100,100,0.6)'; X.fillText('x', cX + cW - 14, cY + 15);
    // Messages area
    if (chat.messages.length === 0) {
      X.font = '400 9px Orbitron,sans-serif'; X.textAlign = 'center';
      X.fillStyle = 'rgba(255,255,255,0.12)';
      X.fillText('No messages yet', cX + cW / 2, cY + 100);
    } else {
      for (let mi = Math.max(0, chat.messages.length - 6); mi < chat.messages.length; mi++) {
        const msg = chat.messages[mi];
        const my = cY + 40 + (mi - Math.max(0, chat.messages.length - 6)) * 18;
        X.font = '700 8px Orbitron,sans-serif'; X.textAlign = 'left';
        X.fillStyle = msg.from === playerName ? '#0fa' : 'rgba(255,255,255,0.5)';
        X.fillText(msg.from + ':', cX + 10, my);
        X.font = '400 9px Orbitron,sans-serif'; X.fillStyle = 'rgba(255,255,255,0.6)';
        X.fillText(msg.text, cX + 10 + X.measureText(msg.from + ': ').width, my);
      }
    }
    // Input box
    const ciY = cY + cH - 32;
    X.fillStyle = 'rgba(255,255,255,0.04)';
    X.strokeStyle = 'rgba(255,255,255,0.12)'; X.lineWidth = 1;
    X.beginPath(); X.roundRect(cX + 8, ciY, cW - 16, 24, 4); X.fill(); X.stroke();
    X.font = '400 9px Orbitron,sans-serif'; X.textAlign = 'left'; X.textBaseline = 'middle';
    X.fillStyle = chat.input ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.2)';
    X.fillText(chat.input || 'Type a message...', cX + 14, ciY + 12);
  }

  // Custom cursor
  const cx = mouseX, cy = mouseY, cs = 12;
  X.strokeStyle = '#0fa'; X.lineWidth = 2; X.lineCap = 'round';
  X.beginPath(); X.moveTo(cx - cs, cy); X.lineTo(cx + cs, cy); X.stroke();
  X.beginPath(); X.moveTo(cx, cy - cs); X.lineTo(cx, cy + cs); X.stroke();
  X.beginPath(); X.arc(cx, cy, cs * 0.55, 0, Math.PI * 2);
  X.strokeStyle = 'rgba(0,255,170,0.5)'; X.lineWidth = 1.5; X.stroke();
}

// ═════════════════════════════════════════════════════════════
function resize() {
  W = C.width = window.innerWidth; H = C.height = window.innerHeight;
  SC = Math.min(W, H) / 600;
}
window.addEventListener('resize', resize);

let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05); last = ts; gDt = dt;
  update(dt); render(); requestAnimationFrame(loop);
}

playerName = ''; resize(); init(); loadLeaderboard(); requestAnimationFrame(loop);
</script>
</body>
</html>
